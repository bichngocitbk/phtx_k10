<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Học Vấn Đáp</title>
<link rel="stylesheet" href="../style_qa.css">
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="page-header">
        <span class="subject-icon" id="subjectIcon">📚</span>
        <div class="subject-info">
            <h1 id="subjectName">Đang tải...</h1>
            <div class="subject-desc" id="subjectDesc"></div>
        </div>
    </div>

    <!-- NAV -->
    <nav class="nav-buttons">
        <a href="../index.html" class="nav-home">← Chọn môn khác</a>
    </nav>

    <!-- CONTROLS -->
    <div class="controls-bar">
        <div class="controls-left">
            <button class="btn-expand-all" onclick="expandAll()">✚ Mở tất cả</button>
            <button class="btn-collapse-all" onclick="collapseAll()">− Ẩn tất cả</button>
        </div>
        <div class="progress-badge" id="progressBadge">Đang tải...</div>
    </div>

    <!-- SEARCH -->
    <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Tìm câu hỏi..." oninput="filterQA()">
    </div>

    <!-- QA LIST -->
    <div id="qaList">
        <div class="state-box">
            <div class="spinner"></div>
            <div>Đang tải dữ liệu từ Google Sheets...</div>
        </div>
    </div>

</div>

<script>
/* ══════════════════════════════════════════════════════════
   ⚙️  CẤU HÌNH — chỉ cần sửa phần này
   ══════════════════════════════════════════════════════════ */
const CONFIG = {
    // 👉 Dán Spreadsheet ID của bạn vào đây
    // Lấy từ URL: https://docs.google.com/spreadsheets/d/SPREADSHEET_ID/edit
    SPREADSHEET_ID: atob("d2h0ekZWNkJELWtwQWxBUDQ0bFY2X0JDNnhaSkZCU2dxOUdSMGh3Vy1PZTE=").split("").reverse().join(""),

    // 👉 API Key của bạn (từ Google Cloud Console)
    API_KEY: atob("WUNnQUMwdHVqMnZSS0Fzdks5dGQzaFdkYnMtQzcwS1RBeVNheklB").split("").reverse().join(""),
    // Thông tin từng môn: key = tên sheet tab trong Google Sheets
    SUBJECTS: {
        'PhatHoc': {
            name: 'Phật Học Đại Cương',
            icon: '☸️',
            desc: 'Tứ Diệu Đế, Bát Chánh Đạo, Tam Pháp Ấn...'
        },
        'HanCo': {
            name: 'Hán Cổ Văn',
            icon: '文',
            desc: 'Ngữ pháp, từ loại, câu văn cổ điển'
        },
        'TrietHoc': {
            name: 'Triết Học Phật Giáo',
            icon: '🏛️',
            desc: 'Duyên khởi, Vô ngã, Trung đạo'
        },
        'KinhTrungBo': {
            name: 'Kinh Trung Bộ',
            icon: '🪷',
            desc: 'Trắc nghiệm: Ôn 45 câu, thi 30 câu. Tự luận: Ôn 3  câu'
        },
        'LichSuPhatGiao': {
            name: 'Lịch Sử Phật Giáo',
            icon: '📜',
            desc: 'Ấn Độ, Trung Hoa, Đông Nam Á'
        },
        'ThienHoc': {
            name: 'Thiền Học',
            icon: '🧘',
            desc: 'Samatha, Vipassanā, các tầng Jhāna'
        },
        'KinhDienPhat': {
            name: 'Kinh Điển Phật Giáo',
            icon: '📖',
            desc: 'Nikāya, A-hàm, Đại Thừa kinh điển'
        }
    }
};
/* ══════════════════════════════════════════════════════════ */

// ── Đọc sheet name từ URL param ──
const params = new URLSearchParams(location.search);
const sheetName = params.get('sheet') || 'PhatHoc';
const subjectInfo = CONFIG.SUBJECTS[sheetName] || { name: sheetName, icon: '📚', desc: '' };

// ── Cập nhật header ──
document.getElementById('subjectIcon').textContent = subjectInfo.icon;
document.getElementById('subjectName').textContent = subjectInfo.name;
document.getElementById('subjectDesc').textContent = subjectInfo.desc;
document.title = subjectInfo.name + ' — Learn QA';

// ── Load dữ liệu từ Google Sheets ──
async function loadData() {
    const range = encodeURIComponent(`${sheetName}!A2:E200`);
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SPREADSHEET_ID}/values/${range}?key=${CONFIG.API_KEY}`;

    try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const rows = data.values || [];

        if (rows.length === 0) {
            showError('Sheet trống hoặc không có dữ liệu từ hàng 2 trở đi.');
            return;
        }

        renderQA(rows);
    } catch (err) {
        showError(`Không tải được dữ liệu.<br><br>
            Kiểm tra:<br>
            &bull; <code>SPREADSHEET_ID</code> đã đúng chưa?<br>
            &bull; <code>API_KEY</code> hợp lệ không?<br>
            &bull; Spreadsheet đã set "Anyone with link can view" chưa?<br>
            &bull; Tên sheet tab: <code>${sheetName}</code> có đúng không?<br><br>
            Lỗi: <code>${err.message}</code>`);
    }
}

// ── Render danh sách câu hỏi ──
function renderQA(rows) {
    const list = document.getElementById('qaList');
    list.innerHTML = '';

    rows.forEach((row, idx) => {
        const [stt, question, answer, explain1, explain2] = row.map(c => (c || '').trim());
        if (!question) return;

        const num = stt || (idx + 1);
        const block = document.createElement('div');
        block.className = 'qa-block';
        block.dataset.text = (question + ' ' + answer + ' ' + explain1 + ' ' + explain2).toLowerCase();

        let rowsHTML = '';

        // Đáp án (luôn có)
        if (answer) {
            rowsHTML += collapsibleRow('answer', 'Đáp án', answer, 'label-answer', 'content-answer');
        }

        // Giải thích 1
        if (explain1) {
            rowsHTML += collapsibleRow('explain1', 'Giải thích ', explain1, 'label-explain', 'content-explain');
        }

        // Giải thích 2
        if (explain2) {
            rowsHTML += collapsibleRow('explain2', 'Bổ sung', explain2, 'label-explain2', 'content-explain');
        }

        block.innerHTML = `
            <div class="question-header" onclick="toggleQuestion(this)">
                <span class="q-num">${num}</span>
                <span class="question-text">${escHtml(question)}</span>
                <span class="q-toggle">▼</span>
            </div>
            <div class="question-body">${rowsHTML}</div>
        `;

        list.appendChild(block);
    });

    updateProgress();
}

function collapsibleRow(type, label, content, labelClass, contentClass) {
    const preview = content.length > 60 ? content.substring(0, 58) + '…' : content;
    return `
        <div class="collapsible-row">
            <div class="row-header" onclick="toggleRow(this)">
                <span class="row-label ${labelClass}">${label}</span>
                <span class="row-preview">${escHtml(preview)}</span>
                <span class="toggle-icon">✚</span>
            </div>
            <div class="row-body">
                <div class="row-content ${contentClass}">${escHtml(content)}</div>
            </div>
        </div>`;
}

function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Toggle question block ──
function toggleQuestion(header) {
    const block = header.closest('.qa-block');
    block.classList.toggle('q-open');
}

// ── Toggle answer/explain row ──
function toggleRow(header) {
    const row = header.closest('.collapsible-row');
    row.classList.toggle('open');
    updateProgress();
}

// ── Expand / Collapse all ──
function expandAll() {
    document.querySelectorAll('.qa-block:not(.hidden-search)').forEach(b => b.classList.add('q-open'));
    document.querySelectorAll('.qa-block:not(.hidden-search) .collapsible-row').forEach(r => r.classList.add('open'));
    updateProgress();
}

function collapseAll() {
    document.querySelectorAll('.qa-block').forEach(b => b.classList.remove('q-open'));
    document.querySelectorAll('.collapsible-row').forEach(r => r.classList.remove('open'));
    updateProgress();
}

// ── Search / Filter ──
function filterQA() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    document.querySelectorAll('.qa-block').forEach(block => {
        const match = !q || block.dataset.text.includes(q);
        block.classList.toggle('hidden-search', !match);
    });
    updateProgress();
}

// ── Progress badge ──
function updateProgress() {
    const visible = document.querySelectorAll('.qa-block:not(.hidden-search)').length;
    const total   = document.querySelectorAll('.qa-block').length;
    const opened  = document.querySelectorAll('.collapsible-row.open').length;
    const badge   = document.getElementById('progressBadge');
    if (total === 0) { badge.textContent = 'Đang tải...'; return; }
    const countTxt = visible < total ? ` (lọc: ${visible}/${total})` : `${total} câu`;
    badge.innerHTML = `Đã mở: <strong>${opened}</strong> mục &nbsp;·&nbsp; ${countTxt}`;
}

// ── Error ──
function showError(msg) {
    document.getElementById('qaList').innerHTML = `
        <div class="error-box">⚠️ ${msg}</div>`;
    document.getElementById('progressBadge').textContent = 'Lỗi tải dữ liệu';
}

// ── Khởi động ──
loadData();
</script>
</body>
</html>
